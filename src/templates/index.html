<!DOCTYPE html>
<html>

<head>

    <title>Provenance Guard</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='styles.css') }}"
    >

</head>

<body>

    <h1>Provenance Guard</h1>

    <textarea
        id="textInput"
        placeholder="Paste text..."
    ></textarea>

    <button id="analyzeButton">
        Analyze
    </button>

    <textarea
        id="appealInput"
        placeholder="Explain why you are appealing this classification..."
    ></textarea>

    <button id="appealButton">
        Submit Appeal
    </button>

    <button id="logButton">
        View Audit Log
    </button>

    <pre id="results"></pre>

    <script
        src="{{ url_for('static', filename='app.js') }}"
    ></script>

</body>

</html>
